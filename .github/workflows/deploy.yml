# Build the content/ folder as a Quartz site and deploy to GitHub Pages.
#
# This repo stores only the Markdown vault (content/). The workflow checks out
# Quartz at build time, drops content/ in, builds, and publishes.
#
# WHY v4 IS PINNED:
#   Quartz's default branch is now v5 (5.0.0), which expects a generated
#   `.quartz/` directory (created by `npx quartz create`) — its components
#   import from "../../.quartz/plugins", so a bare clone-and-build fails with
#   `Could not resolve "../../.quartz/plugins"`. Quartz v4 (4.5.2) uses normal
#   relative imports and builds directly from a clone, which is what this
#   content-only deploy pattern relies on. So we pin `ref: v4`.
#   To move to v5 later, vendor a full `npx quartz create` scaffold into this
#   repo and build that instead.
#
# ONE-TIME SETUP:
#   1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. Push to main. The site builds and deploys automatically.
#
# Quartz docs: https://quartz.jzhao.xyz/

name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Project page is served from https://<user>.github.io/scFM-Wiki — set baseUrl so
# sitemap/RSS/OG absolute URLs are correct. Page paths in Quartz are relative, so
# navigation works at the subpath regardless.
env:
  SITE_TITLE: scFM-Wiki
  SITE_BASEURL: yujinkim26hub.github.io/scFM-Wiki

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki content
        uses: actions/checkout@v4
        with:
          path: wiki

      - name: Checkout Quartz (pinned to stable v4)
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz deps
        working-directory: quartz
        run: npm ci

      - name: Copy vault into Quartz content
        run: |
          rm -rf quartz/content
          cp -r wiki/content quartz/content
          # Templates stay in the repo / Obsidian vault, but are excluded from the
          # published site so their placeholder frontmatter doesn't emit junk pages
          # (e.g. <concept>.html, <model-name>.html).
          rm -rf quartz/content/90-Meta/templates

      - name: Set site title and baseUrl
        working-directory: quartz
        run: |
          # Replace Quartz's default pageTitle ("🪴 Quartz 4") with the wiki name,
          # and set baseUrl for the GitHub Pages project subpath.
          sed -i -E "s#pageTitle: \"[^\"]*\"#pageTitle: \"${SITE_TITLE}\"#" quartz.config.ts
          sed -i -E "s#baseUrl: \"[^\"]*\"#baseUrl: \"${SITE_BASEURL}\"#" quartz.config.ts
          grep -nE "pageTitle|baseUrl" quartz.config.ts || true

      - name: Build site
        working-directory: quartz
        run: npx quartz build
        # Emits to quartz/public (default output folder).

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
